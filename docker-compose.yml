version: '3.8'

services:
  # MySQL Database
  database:
    image: mysql:8.0
    container_name: my_store_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-DBWebBanDoBongDa}
      MYSQL_USER: ${DB_USER:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Database:/docker-entrypoint-initdb.d
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./Backend/my_store_backend
      dockerfile: Dockerfile
    container_name: my_store_backend
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      DB_HOST: database
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_NAME: ${DB_NAME:-DBWebBanDoBongDa}
      DB_PORT: 3306
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-here}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: 3006
      NODE_ENV: production
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - ./Backend/my_store_backend:/app
      - /app/node_modules

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my_store_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network
    environment:
      REACT_APP_API_URL: http://localhost:3006

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
